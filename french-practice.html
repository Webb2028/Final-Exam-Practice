<script>
/* =====================================================================
   FRENCH PRACTICE APP
   ===================================================================== */

/* ---------- Verb data ---------- */
const verbsER = [
  { inf: "parler",     en: "to speak",     vowel: false },
  { inf: "aimer",      en: "to like/love", vowel: true  },
  { inf: "manger",     en: "to eat",       vowel: false },
  { inf: "chanter",    en: "to sing",      vowel: false },
  { inf: "écouter",    en: "to listen",    vowel: true  },
  { inf: "regarder",   en: "to watch",     vowel: false },
  { inf: "étudier",    en: "to study",     vowel: true  },
  { inf: "travailler", en: "to work",      vowel: false },
  { inf: "habiter",    en: "to live",      vowel: true  },
  { inf: "danser",     en: "to dance",     vowel: false },
  { inf: "marcher",    en: "to walk",      vowel: false },
  { inf: "donner",     en: "to give",      vowel: false },
  { inf: "jouer",      en: "to play",      vowel: false },
  { inf: "trouver",    en: "to find",      vowel: false },
  { inf: "porter",     en: "to wear/carry",vowel: false },
  { inf: "fermer",     en: "to close",     vowel: false },
  { inf: "laver",      en: "to wash",      vowel: false },
  { inf: "rester",     en: "to stay",      vowel: false },
  { inf: "monter",     en: "to go up",     vowel: false },
  { inf: "tomber",     en: "to fall",      vowel: false }
];

const verbsIR = [
  { inf: "finir",     en: "to finish",  vowel: false },
  { inf: "choisir",   en: "to choose",  vowel: false },
  { inf: "grandir",   en: "to grow up", vowel: false },
  { inf: "réussir",   en: "to succeed", vowel: false },
  { inf: "obéir",     en: "to obey",    vowel: true  },
  { inf: "remplir",   en: "to fill",    vowel: false },
  { inf: "applaudir", en: "to applaud", vowel: true  },
  { inf: "punir",     en: "to punish",  vowel: false },
  { inf: "rougir",    en: "to blush",   vowel: false },
  { inf: "maigrir",   en: "to lose weight", vowel: false },
  { inf: "grossir",   en: "to gain weight", vowel: false }
];

const verbsRE = [
  { inf: "vendre",    en: "to sell",     vowel: false },
  { inf: "attendre",  en: "to wait for", vowel: true  },
  { inf: "descendre", en: "to go down",  vowel: false },
  { inf: "entendre",  en: "to hear",     vowel: true  },
  { inf: "perdre",    en: "to lose",     vowel: false },
  { inf: "rendre",    en: "to give back",vowel: false },
  { inf: "répondre",  en: "to answer",   vowel: false },
  { inf: "défendre",  en: "to defend",   vowel: false }
];

const pronouns = [
  { p: "je",      idx: 0, vowel: true  },   // becomes j' before a vowel
  { p: "tu",      idx: 1, vowel: false },
  { p: "il",      idx: 2, vowel: false },
  { p: "elle",    idx: 2, vowel: false },
  { p: "on",      idx: 2, vowel: false },
  { p: "nous",    idx: 3, vowel: false },
  { p: "vous",    idx: 4, vowel: false },
  { p: "ils",     idx: 5, vowel: false },
  { p: "elles",   idx: 5, vowel: false }
];

/* ---------- Conjugation logic ---------- */
function conjugatePresentER(inf) {
  let stem = inf.slice(0, -2);
  return [
    stem + "e",
    stem + "es",
    stem + "e",
    stem + "ons",
    stem + "ez",
    stem + "ent"
  ];
}
function conjugatePresentIR(inf) {
  let stem = inf.slice(0, -2);
  return [
    stem + "is",
    stem + "is",
    stem + "it",
    stem + "issons",
    stem + "issez",
    stem + "issent"
  ];
}
function conjugatePresentRE(inf) {
  let stem = inf.slice(0, -2);
  return [
    stem + "s",
    stem + "s",
    stem,
    stem + "ons",
    stem + "ez",
    stem + "ent"
  ];
}
function pastParticiple(inf, group) {
  let stem = inf.slice(0, -2);
  if (group === "er") return stem + "é";
  if (group === "ir") return stem + "i";
  if (group === "re") return stem + "u";
}

/* Irregulars */
const irregular = {
  avoir: {
    en: "to have",
    present: ["ai", "as", "a", "avons", "avez", "ont"],
    passe:   ["ai eu", "as eu", "a eu", "avons eu", "avez eu", "ont eu"],
    presentStartsVowel: [true, false, false, false, false, false]
  },
  être: {
    en: "to be",
    present: ["suis", "es", "est", "sommes", "êtes", "sont"],
    passe:   ["ai été", "as été", "a été", "avons été", "avez été", "ont été"],
    presentStartsVowel: [false, true, true, false, true, false]
  },
  aller: {
    en: "to go",
    present: ["vais", "vas", "va", "allons", "allez", "vont"],
    // aller uses être as auxiliary in passé composé — we keep it to present-only
    passe:   null,
    presentStartsVowel: [false, false, false, false, false, false]
  },
  faire: {
    en: "to do/make",
    present: ["fais", "fais", "fait", "faisons", "faites", "font"],
    passe:   ["ai fait", "as fait", "a fait", "avons fait", "avez fait", "ont fait"],
    presentStartsVowel: [false, false, false, false, false, false]
  }
};

/* ---------- Pronoun formatting (elision) ---------- */
function pronounWithVerb(pronounObj, verbForm) {
  // Check if verb starts with a vowel or silent h
  const firstChar = verbForm.charAt(0).toLowerCase();
  const vowelStart = "aeiouéèêàâîïôöùûhAEIOUÉÈÊÀÂÎÏÔÖÙÛH".includes(firstChar);
  if (pronounObj.p === "je" && vowelStart) {
    return "j'" + verbForm;
  }
  return pronounObj.p + " " + verbForm;
}

/* ---------- Random helpers ---------- */
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function uniqueDistractors(correct, pool, n = 3) {
  const set = new Set();
  let attempts = 0;
  while (set.size < n && attempts < 100) {
    const d = pick(pool);
    if (d !== correct && !set.has(d)) set.add(d);
    attempts++;
  }
  return Array.from(set);
}

/* ---------- Question generators ---------- */
function genRegularQ(tense, allowedGroups) {
  // allowedGroups: subset of ["er","ir","re"]
  const group = pick(allowedGroups);
  const pool = group === "er" ? verbsER : group === "ir" ? verbsIR : verbsRE;
  const verb = pick(pool);
  const pronoun = pick(pronouns);

  let correctForm, distractorPool;

  if (tense === "present") {
    const forms = group === "er" ? conjugatePresentER(verb.inf)
                 : group === "ir" ? conjugatePresentIR(verb.inf)
                 : conjugatePresentRE(verb.inf);
    correctForm = forms[pronoun.idx];
    // Build distractor pool: other present forms of same verb + forms of similar verbs
    distractorPool = forms.slice();
    // Add a few forms from other random verbs of same group
    for (let i = 0; i < 3; i++) {
      const otherVerb = pick(pool);
      const otherForms = group === "er" ? conjugatePresentER(otherVerb.inf)
                      : group === "ir" ? conjugatePresentIR(otherVerb.inf)
                      : conjugatePresentRE(otherVerb.inf);
      distractorPool.push(otherForms[Math.floor(Math.random() * 6)]);
    }
  } else { // passé composé
    const avoirForms = irregular.avoir.present;
    const pp = pastParticiple(verb.inf, group);
    correctForm = avoirForms[pronoun.idx] + " " + pp;
    // Distractors: wrong auxiliary form + wrong past participle ending
    distractorPool = [];
    avoirForms.forEach(a => distractorPool.push(a + " " + pp));
    // Wrong past participle endings
    const stem = verb.inf.slice(0, -2);
    const wrongPPs = [stem + "é", stem + "i", stem + "u"].filter(x => x !== pp);
    wrongPPs.forEach(wpp => distractorPool.push(avoirForms[pronoun.idx] + " " + wpp));
  }

  const distractors = uniqueDistractors(correctForm, distractorPool, 3);
  // If we don't have 3 distractors, pad with random plausible options
  while (distractors.length < 3) {
    distractors.push(verb.inf + (distractors.length === 0 ? "e" : "s"));
  }
  const choices = shuffle([correctForm, ...distractors]);

  const promptText = pronounWithVerb(pronoun, "____") + ".";
  const hint = verb.inf + " (" + verb.en + ")"
    + " · " + (tense === "present" ? "présent" : "passé composé");

  return { prompt: promptText, hint, correct: correctForm, choices };
}

function genIrregularQ() {
  const verbNames = Object.keys(irregular);
  const name = pick(verbNames);
  const data = irregular[name];
  // Decide tense: present always available; passé composé only if data.passe exists
  const tenses = data.passe ? ["present", "passe"] : ["present"];
  const tense = pick(tenses);
  const forms = tense === "present" ? data.present : data.passe;
  const pronoun = pick(pronouns);
  const correctForm = forms[pronoun.idx];

  // Distractors: other forms of same verb + forms of other irregulars
  const distractorPool = forms.slice();
  verbNames.filter(v => v !== name).forEach(v => {
    const other = irregular[v];
    const otherForms = tense === "present" ? other.present : (other.passe || other.present);
    distractorPool.push(otherForms[pronoun.idx]);
    distractorPool.push(otherForms[Math.floor(Math.random() * 6)]);
  });

  const distractors = uniqueDistractors(correctForm, distractorPool, 3);
  while (distractors.length < 3) distractors.push(name);
  const choices = shuffle([correctForm, ...distractors]);

  const promptText = pronounWithVerb(pronoun, "____") + ".";
  const hint = name + " (" + data.en + ")"
    + " · " + (tense === "present" ? "présent" : "passé composé");

  return { prompt: promptText, hint, correct: correctForm, choices };
}

/* ---------- Writing prompts ---------- */
const writingPrompts = [
  {
    q: "Pourquoi tu aimes le français?",

  {

  {

    sample: "J'habite dans une petite ville. Il y a une école, un parc et quelques magasins. Mon quartier est calme et joli. J'aime marcher dans le parc avec mes amis. En été, il fait chaud et nous jouons dehors."

  {

  },

  {

    sample: "Après l'école, je rentre à la maison et je mange un goûter. Ensuite, je fais mes devoirs pendant deux heures. Quand j'ai fini, je joue au foot avec mes amis ou j'écoute de la musique. Le soir, je dîne avec ma famille."
  },
  {
    q: "Quel sport tu préfères et pourquoi?",
    sample: "Mon sport préféré, c'est le tennis. J'aime le tennis parce que c'est un sport rapide et stratégique. Je joue au tennis avec mon père tous les week-ends. C'est aussi une bonne activité pour rester en forme et passer du temps en famille."
  },
  {
    q: "Décris ton professeur préféré.",
    sample: "Mon professeur préféré, c'est mon prof de français. Il est très gentil et patient. Il explique bien les leçons et il a beaucoup d'humour. Dans sa classe, nous apprenons beaucoup et nous nous amusons. J'aime aller à son cours."
  },
  {
    q: "Qu'est-ce que tu aimes regarder à la télé?",
    sample: "J'aime regarder des séries comiques à la télé. Je trouve ces séries très amusantes et elles me font rire. Je regarde aussi des documentaires sur les animaux parce que j'aime la nature. Le week-end, je regarde des films avec ma famille."
  },
  {
    q: "Décris une fête que tu aimes.",
    sample: "Ma fête préférée, c'est mon anniversaire. Chaque année, mes amis viennent à la maison. Nous mangeons un gâteau et nous jouons à des jeux. Je reçois des cadeaux de ma famille. C'est toujours une journée très spéciale et joyeuse."
  }
];

/* ---------- App state ---------- */
let mode = "present";
let stats = { present: {c:0,t:0}, passe: {c:0,t:0}, irregular: {c:0,t:0} };
let currentQ = null;

/* ---------- Rendering ---------- */
const card = document.getElementById("card");

function renderQuestion() {
  if (mode === "writing") {
    renderWriting();
    return;
  }

  if (mode === "present")    currentQ = genRegularQ("present", ["er","ir","re"]);
  if (mode === "passe")      currentQ = genRegularQ("passe",   ["er","ir","re"]);
  if (mode === "irregular")  currentQ = genIrregularQ();

  const s = stats[mode];
  const pct = s.t > 0 ? Math.round(100 * s.c / s.t) : 0;

  card.innerHTML = `
    <div class="prompt-label">Choisis la bonne forme</div>
    <div class="prompt">${escapeHTML(currentQ.prompt)}</div>
    <div class="verb-hint">${escapeHTML(currentQ.hint)}</div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn hidden" id="nextBtn">Question suivante →</button>
    <div class="score">
      <span>Score: <b>${s.c} / ${s.t}</b> ${s.t > 0 ? "(" + pct + "%)" : ""}</span>
      <button class="secondary-btn" id="resetBtn" style="padding:6px 12px;font-size:13px;">Reset score</button>
    </div>
  `;

  const choicesDiv = document.getElementById("choices");
  currentQ.choices.forEach(ch => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = ch;
    btn.onclick = () => handleAnswer(btn, ch);
    choicesDiv.appendChild(btn);
  });

  document.getElementById("nextBtn").onclick = renderQuestion;
  document.getElementById("resetBtn").onclick = () => {
    stats[mode] = {c:0, t:0};
    renderQuestion();
  };
}

function handleAnswer(btn, chosen) {
  const buttons = document.querySelectorAll(".choice");
  buttons.forEach(b => {
    b.disabled = true;
    if (b.textContent === currentQ.correct) b.classList.add("correct");
    else if (b === btn) b.classList.add("wrong");
  });
  const fb = document.getElementById("feedback");
  const s = stats[mode];
  s.t++;
  if (chosen === currentQ.correct) {
    s.c++;
    fb.textContent = "✓ Très bien!";
    fb.className = "feedback good";
  } else {
    fb.textContent = "✗ La bonne réponse est : " + currentQ.correct;
    fb.className = "feedback bad";
  }
  // Update score display
  const scoreSpan = document.querySelector(".score span");
  const pct = Math.round(100 * s.c / s.t);
  scoreSpan.innerHTML = `Score: <b>${s.c} / ${s.t}</b> (${pct}%)`;

  document.getElementById("nextBtn").classList.remove("hidden");
}

function renderWriting() {
  const prompt = pick(writingPrompts);
  card.innerHTML = `
    <div class="prompt-label">Expression écrite</div>
    <div class="prompt">${escapeHTML(prompt.q)}</div>
    <div class="verb-hint">Write 3–5 sentences. When you finish, click "Show sample answer" to compare.</div>
    <textarea id="userWriting" placeholder="Écris ta réponse ici..."></textarea>
    <div style="margin-top:14px;">
      <button class="secondary-btn" id="showSample">Show sample answer</button>
      <button class="primary-btn" id="newPrompt">New prompt →</button>
    </div>
    <div class="sample-answer hidden" id="sampleBox">
      <span class="label">Sample answer (one possibility)</span>
      ${escapeHTML(prompt.sample)}
    </div>
    <p class="keyboard-tip">Tip: there are many right answers. Use this sample only to check your grammar and vocabulary.</p>
  `;
  document.getElementById("showSample").onclick = () => {
    document.getElementById("sampleBox").classList.remove("hidden");
  };
  document.getElementById("newPrompt").onclick = renderWriting;
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[c]));
}

/* ---------- Tab handling ---------- */
document.querySelectorAll(".tab").forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    mode = tab.dataset.mode;
    renderQuestion();
  };
});

/* ---------- Start ---------- */
renderQuestion();
</script>
